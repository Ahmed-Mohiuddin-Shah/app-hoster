<div
  id="server-links-modal"
  class="fixed inset-0 z-50 hidden items-center justify-center bg-black/80 p-4"
  aria-hidden="true"
  role="dialog"
  aria-labelledby="server-links-modal-title"
>
  <div
    class="relative max-h-[90vh] w-full max-w-lg overflow-y-auto rounded-xl border border-zinc-800 bg-zinc-950 p-6 shadow-xl shadow-accent/5"
  >
    <button
      type="button"
      id="close-server-links-modal"
      class="absolute right-4 top-4 rounded-full border border-zinc-700 px-3 py-1 text-xs text-zinc-400 hover:border-zinc-500 hover:text-white"
      aria-label="Close"
    >
      ✕
    </button>
    <h2 id="server-links-modal-title" class="text-lg font-semibold text-white">Upload server links</h2>
    <p class="mt-1 text-xs text-zinc-500">
      Base URL of each upload host (no trailing path). Used to call <span class="font-mono text-zinc-400">/api-version</span> and
      compare with each release’s server version. Saving requires the same secret key as uploads. Desktop only.
    </p>

    <div class="mt-6 space-y-4">
      <div>
        <label class="mb-1 block text-xs font-medium text-zinc-400" for="server-link-prod">Production (release)</label>
        <p id="server-link-prev-prod" class="mb-1 hidden text-[10px] text-zinc-600"></p>
        <input
          type="url"
          id="server-link-prod"
          autocomplete="off"
          placeholder="https://upload-prod.example.com"
          class="w-full rounded-lg border border-zinc-700 bg-black px-3 py-2 text-sm text-white placeholder:text-zinc-600 focus:border-accent focus:outline-none"
        />
      </div>
      <div>
        <label class="mb-1 block text-xs font-medium text-zinc-400" for="server-link-profile">Profile</label>
        <p id="server-link-prev-profile" class="mb-1 hidden text-[10px] text-zinc-600"></p>
        <input
          type="url"
          id="server-link-profile"
          autocomplete="off"
          placeholder="https://upload-profile.example.com (optional; defaults to debug)"
          class="w-full rounded-lg border border-zinc-700 bg-black px-3 py-2 text-sm text-white placeholder:text-zinc-600 focus:border-accent focus:outline-none"
        />
      </div>
      <div>
        <label class="mb-1 block text-xs font-medium text-zinc-400" for="server-link-debug">Debug</label>
        <p id="server-link-prev-debug" class="mb-1 hidden text-[10px] text-zinc-600"></p>
        <input
          type="url"
          id="server-link-debug"
          autocomplete="off"
          placeholder="https://upload-debug.example.com"
          class="w-full rounded-lg border border-zinc-700 bg-black px-3 py-2 text-sm text-white placeholder:text-zinc-600 focus:border-accent focus:outline-none"
        />
      </div>
      <div>
        <label class="mb-1 block text-xs font-medium text-zinc-400" for="server-links-secret">Secret key</label>
        <input
          type="password"
          id="server-links-secret"
          autocomplete="off"
          placeholder="Required to save"
          class="w-full rounded-lg border border-zinc-700 bg-black px-3 py-2 text-sm text-white placeholder:text-zinc-600 focus:border-accent focus:outline-none"
        />
      </div>
      <p id="server-links-message" class="hidden text-xs"></p>
      <div class="flex justify-end gap-2 pt-2">
        <button
          type="button"
          id="cancel-server-links-modal"
          class="rounded-full border border-zinc-600 px-4 py-2 text-sm text-zinc-300 transition hover:border-zinc-500"
        >
          Cancel
        </button>
        <button
          type="button"
          id="save-server-links-modal"
          class="rounded-full border border-accent bg-accent/10 px-4 py-2 text-sm font-medium text-accent transition hover:bg-accent/20"
        >
          Save
        </button>
      </div>
    </div>
  </div>
</div>
