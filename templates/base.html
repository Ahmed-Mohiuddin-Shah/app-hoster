<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark" />
  <link rel="icon" href="/svgs/favicon.svg" type="image/svg+xml" />
  <title>{% block title %}{{ project_name }}{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            accent: "#39FF14",
          },
        },
      },
    };
  </script>
  <style>
    /* Firefox — apply to scroll containers (not only the root) */
    * {
      scrollbar-color: #3f3f46 #09090b;
      scrollbar-width: thin;
    }
    /* Chromium / Safari */
    *::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }
    *::-webkit-scrollbar-track {
      background: #09090b;
      border-radius: 9999px;
    }
    *::-webkit-scrollbar-thumb {
      background: #3f3f46;
      border-radius: 9999px;
      border: 2px solid #09090b;
    }
    *::-webkit-scrollbar-thumb:hover {
      background: #52525b;
    }
    *::-webkit-scrollbar-corner {
      background: #09090b;
    }
    /* Collapsed sidebar: icon-only platform tabs */
    #sidebar[data-collapsed="true"] .sidebar-tabs {
      padding-left: 0.35rem;
      padding-right: 0.35rem;
    }
    #sidebar[data-collapsed="true"] .tab-btn {
      justify-content: center;
      gap: 0;
      padding-left: 0.25rem;
      padding-right: 0.25rem;
    }
  </style>
</head>
<body class="h-full min-h-screen bg-black text-white antialiased">
  {% block content %}{% endblock %}
  {% block scripts %}{% endblock %}
</body>
</html>
